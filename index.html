<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CUE Master Editor v11 (Power User)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1150px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        
        h2 { 
            margin-top: 0; 
            color: #2c3e50; 
            border-bottom: 3px solid #0078d4; 
            padding-bottom: 15px; 
            display: flex;
            align-items: center;
        }
        .version-badge { font-size: 12px; background: #E91E63; color: white; padding: 4px 8px; border-radius: 12px; vertical-align: middle; margin-left: 15px; letter-spacing: 0.5px; }
        
        .lang-switch {
            margin-left: auto; background: #e1e4e8; border: none; padding: 6px 12px;
            border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; color: #333;
        }
        .lang-switch:hover { background: #cdd2d9; }

        .panel { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-weight: 600; font-size: 12px; color: #6c757d; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"] { 
            width: 100%; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; font-size: 14px; transition: 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus { border-color: #0078d4; outline: none; box-shadow: 0 0 0 3px rgba(0,120,212,0.1); }
        
        /* Modal Windows */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 10px; width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-top: 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .radio-group { margin: 15px 0; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef; }
        .radio-group label { display: inline-flex; align-items: center; text-transform: none; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 0; cursor: pointer;}
        .radio-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .radio-row:last-child { margin-bottom: 0; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        /* Case Formats list */
        .case-btn { display: block; width: 100%; text-align: left; padding: 10px 15px; margin-bottom: 8px; border: 1px solid #ced4da; background: #fff; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 14px;}
        .case-btn:hover { background: #f0f7ff; border-color: #0078d4; color: #0078d4; }

        .drop-zone { 
            border: 2px dashed #cbd5e0; border-radius: 8px; min-height: 250px; 
            position: relative; background: #fff; transition: all 0.2s;
        }
        .drop-zone.dragover { border-color: #0078d4; background-color: #f0f7ff; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 0; }
        th { background: #343a40; color: white; padding: 12px 10px; text-align: left; font-weight: 600; }
        td { border-bottom: 1px solid #eee; padding: 4px; vertical-align: middle; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #fff9e6; } 
        
        input.table-input { width: 100%; border: 1px solid transparent; background: transparent; padding: 8px; box-sizing: border-box; font-size: 13px; color: #333; }
        input.table-input:focus { border: 1px solid #0078d4; background: white; outline: none; border-radius: 4px; }
        
        .btn-bar { display: flex; gap: 10px; margin-top: 25px; align-items: center; flex-wrap: wrap;}
        button { 
            padding: 8px 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 13px; 
            transition: background 0.2s, transform 0.1s; display: inline-flex; align-items: center; justify-content: center; gap: 5px;
        }
        button:active { transform: scale(0.98); }
        
        .btn-import { background: #28a745; color: white; font-size: 14px; padding: 10px 18px; }
        .btn-create { background: #17a2b8; color: white; font-size: 14px; padding: 10px 18px; }
        .btn-split { background: #6f42c1; color: white; font-size: 14px; padding: 10px 18px; }
        .btn-case { background: #ffc107; color: #212529; font-size: 14px; padding: 10px 18px; }
        .btn-save { background: #0078d4; color: white; margin-left: auto; font-size: 15px; padding: 12px 24px; box-shadow: 0 4px 6px rgba(0,120,212,0.2); }
        .btn-clear { background: #6c757d; color: white; font-size: 14px; padding: 10px 18px;}
        
        .btn-icon { width: 34px; height: 34px; padding: 0; border-radius: 4px; }
        .btn-apply-perf { background: #0078d4; color: white; font-size: 16px; margin-left: 5px; }
        .btn-apply-perf:hover { background: #005a9e; }
        
        .btn-move { background: #e1e4e8; color: #333; height:28px; width:28px;}
        .btn-move:hover { background: #cdd2d9; }
        .btn-move:disabled { opacity: 0.3; cursor: default; }
        .btn-ins { background: #e3f2fd; color: #0078d4; margin-left: 5px; height:28px; width:28px;}
        .btn-ins:hover { background: #bbdefb; }
        .btn-del { background: #ffebee; color: #c62828; margin-left: 5px; height:28px; width:28px;}
        .btn-del:hover { background: #ffcdd2; }

        .hidden-file { display: none; }
        
        .empty-state {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #adb5bd; pointer-events: none;
        }
        .empty-state p { margin: 10px 0; font-size: 16px; font-weight: 500; }
        .sub-text { font-size: 13px; color: #ced4da; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <span>💿 CUE Master Editor</span>
        <span class="version-badge">v11 Power User</span>
        <button class="lang-switch" onclick="toggleLang()" id="btnLang">🇷🇺 RU</button>
    </h2>

    <div class="panel">
        <div class="grid-2">
            <div>
                <div class="form-group">
                    <label id="lbl_perf">ИСПОЛНИТЕЛЬ АЛЬБОМА (Performer):</label>
                    <div style="display: flex;">
                        <input type="text" id="g_performer" oninput="updateTablePlaceholders()">
                        <button onclick="applyPerformerToAll()" class="btn-icon btn-apply-perf" id="btn_apply_perf" title="Применить ко всем трекам">⮟</button>
                    </div>
                </div>
                <div class="form-group">
                    <label id="lbl_genre">ЖАНР (Genre):</label>
                    <input type="text" id="g_genre">
                </div>
            </div>
            <div>
                <div class="form-group">
                    <label id="lbl_title">НАЗВАНИЕ АЛЬБОМА (Title):</label>
                    <input type="text" id="g_title">
                </div>
                <div class="form-group">
                    <label id="lbl_date">ГОД (Date):</label>
                    <input type="text" id="g_date">
                </div>
            </div>
        </div>
    </div>

    <div id="dropZone" class="drop-zone">
        <div id="emptyState" class="empty-state">
            <p id="txt_empty_title">Перетащите файлы сюда</p>
            <div class="sub-text" id="txt_empty_sub">CUE, TXT, FLAC, WAV, MP3</div>
        </div>
        
        <table id="trackTable" style="display:none;">
            <thead>
                <tr>
                    <th width="35" style="text-align:center;">#</th>
                    <th width="200" id="th_file">Имя файла (File)</th>
                    <th id="th_title">Название трека (Title)</th>
                    <th width="150" id="th_perf">Исполнитель (Performer)</th>
                    <th width="80" style="text-align:center;" id="th_idx">Индекс</th>
                    <th width="140" style="text-align:center;" id="th_act">Действия</th>
                </tr>
            </thead>
            <tbody id="tbody">
            </tbody>
        </table>
    </div>

    <div class="btn-bar">
        <input type="file" id="fileInput" class="hidden-file" multiple accept=".cue,.txt,.flac,.wav,.mp3,.ape,.m4a,.ogg">
        <button class="btn-import" onclick="document.getElementById('fileInput').click()" id="btn_import">📂 Импорт</button>
        <button class="btn-create" onclick="addManualTrack()" id="btn_create">➕ Пустой</button>
        <button class="btn-split" onclick="openSplitModal()" id="btn_split">✂️ Нарезать</button>
        <button class="btn-case" onclick="openCaseModal()" id="btn_case">🔠 Регистр</button>
        <button class="btn-clear" onclick="clearAll()" id="btn_clear">🗑 Очистить</button>
        <button class="btn-save" onclick="saveCUE()" id="btn_save">💾 СОХРАНИТЬ CUE</button>
    </div>
</div>

<div id="splitModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="mod_title">Нарезка файла на треки</h3>
        <div class="form-group">
            <label id="mod_lbl_file">Имя аудиофайла:</label>
            <input type="text" id="split_file" value="Audio.wav">
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label id="mod_lbl_total">Общая длительность файла (MM:SS):</label>
            <input type="text" id="split_total" placeholder="Например: 60:00">
        </div>
        <div class="radio-group">
            <div class="radio-row">
                <label><input type="radio" name="split_mode" value="parts" checked> &nbsp;<span id="mod_rad_parts">Разбить на равные части (шт):</span></label>
                <input type="number" id="split_parts" value="10" min="2" style="width: 80px;">
            </div>
            <div class="radio-row">
                <label><input type="radio" name="split_mode" value="time"> &nbsp;<span id="mod_rad_time">Каждые (MM:SS):</span></label>
                <input type="text" id="split_time" placeholder="05:00" style="width: 80px;">
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn-clear" onclick="closeSplitModal()" id="mod_btn_cancel">Отмена</button>
            <button class="btn-save" onclick="applySplit()" id="mod_btn_apply">Создать</button>
        </div>
    </div>
</div>

<div id="caseModal" class="modal-overlay">
    <div class="modal-content" style="width: 400px;">
        <h3 id="case_mod_title">Регистр названий треков</h3>
        <p style="font-size: 13px; color: #666; margin-top:0;" id="case_desc">Изменить регистр у всех названий в таблице:</p>
        
        <button class="case-btn" onclick="applyCase('title')" id="case_title">Каждое Слово С Заглавной</button>
        <button class="case-btn" onclick="applyCase('title_smart')" id="case_smart">Каждое Слово (кроме слов-связок)</button>
        <button class="case-btn" onclick="applyCase('sentence')" id="case_sentence">Первое слово с заглавной</button>
        <button class="case-btn" onclick="applyCase('upper')" id="case_upper">ВСЕ ЗАГЛАВНЫЕ</button>
        <button class="case-btn" onclick="applyCase('lower')" id="case_lower">все строчные</button>

        <div class="modal-actions" style="margin-top: 15px;">
            <button class="btn-clear" onclick="closeCaseModal()" id="case_btn_close">Отмена</button>
        </div>
    </div>
</div>

<script>
    // --- СЛОВАРЬ ПЕРЕВОДОВ ---
    const dict = {
        ru: {
            lbl_perf: "ИСПОЛНИТЕЛЬ АЛЬБОМА (Performer):", lbl_genre: "ЖАНР (Genre):", lbl_title: "НАЗВАНИЕ АЛЬБОМА (Title):", lbl_date: "ГОД (Date):",
            th_file: "Имя файла (File)", th_title: "Название трека (Title)", th_perf: "Исполнитель (Performer)", th_idx: "Индекс", th_act: "Действия",
            txt_empty_title: "Перетащите файлы сюда",
            btn_import: "📂 Импорт", btn_create: "➕ Пустой", btn_split: "✂️ Нарезать", btn_case: "🔠 Регистр", btn_clear: "🗑 Очистить", btn_save: "💾 СОХРАНИТЬ CUE",
            ph_perf: "Исполнитель", new_track: "Новый трек", ins_track: "Вставленный трек", alert_empty: "Добавьте хотя бы один трек!", confirm_clear: "Очистить весь список?",
            title_up: "Вверх", title_down: "Вниз", title_ins: "Вставить после", title_del: "Удалить",
            btn_apply_perf: "Применить ко всем трекам",
            // Модалка нарезки
            mod_title: "Автоматическая нарезка", mod_lbl_file: "Имя аудиофайла (File):", mod_lbl_total: "Общая длительность (MM:SS):", mod_rad_parts: "Разбить на равные части (шт):", mod_rad_time: "Каждые (MM:SS):", mod_btn_cancel: "Отмена", mod_btn_apply: "Создать треки", alert_duration: "Укажите корректную длительность (например, 60:00)", track_prefix: "Часть",
            // Модалка регистра
            case_mod_title: "Регистр названий треков", case_desc: "Изменить регистр у всех названий в таблице:", case_title: "Каждое Слово С Заглавной", case_smart: "Каждое Слово С Заглавной (кроме слов-связок)", case_sentence: "Первое слово с заглавной", case_upper: "ВСЕ ЗАГЛАВНЫЕ", case_lower: "все строчные", case_btn_close: "Отмена"
        },
        en: {
            lbl_perf: "ALBUM PERFORMER:", lbl_genre: "GENRE:", lbl_title: "ALBUM TITLE:", lbl_date: "YEAR (Date):",
            th_file: "File Name", th_title: "Track Title", th_perf: "Performer", th_idx: "Index", th_act: "Actions",
            txt_empty_title: "Drop files here",
            btn_import: "📂 Import", btn_create: "➕ Empty", btn_split: "✂️ Split", btn_case: "🔠 Case", btn_clear: "🗑 Clear", btn_save: "💾 SAVE CUE",
            ph_perf: "Performer", new_track: "New Track", ins_track: "Inserted Track", alert_empty: "Add at least one track!", confirm_clear: "Clear the entire list?",
            title_up: "Move Up", title_down: "Move Down", title_ins: "Insert After", title_del: "Delete",
            btn_apply_perf: "Apply to all tracks",
            // Модалка нарезки
            mod_title: "Auto-Split Generator", mod_lbl_file: "Audio File Name:", mod_lbl_total: "Total Duration (MM:SS):", mod_rad_parts: "Divide into equal parts (qty):", mod_rad_time: "Split every (MM:SS):", mod_btn_cancel: "Cancel", mod_btn_apply: "Generate Tracks", alert_duration: "Please enter a valid duration (e.g., 60:00)", track_prefix: "Part",
            // Модалка регистра
            case_mod_title: "Track Title Case", case_desc: "Change case for all titles in the list:", case_title: "Title Case", case_smart: "Title Case (Except Stop Words)", case_sentence: "Sentence case", case_upper: "UPPERCASE", case_lower: "lowercase", case_btn_close: "Cancel"
        }
    };

    let currentLang = 'ru';
    function t(key) { return dict[currentLang][key]; }

    function toggleLang() {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        document.getElementById('btnLang').innerText = currentLang === 'ru' ? '🇷🇺 RU' : '🇬🇧 EN';
        
        const staticIds = [
            'lbl_perf', 'lbl_genre', 'lbl_title', 'lbl_date', 'th_file', 'th_title', 'th_perf', 'th_idx', 'th_act',
            'txt_empty_title', 'btn_import', 'btn_create', 'btn_split', 'btn_case', 'btn_clear', 'btn_save',
            'mod_title', 'mod_lbl_file', 'mod_lbl_total', 'mod_rad_parts', 'mod_rad_time', 'mod_btn_cancel', 'mod_btn_apply',
            'case_mod_title', 'case_desc', 'case_title', 'case_smart', 'case_sentence', 'case_upper', 'case_lower', 'case_btn_close'
        ];
        staticIds.forEach(id => { const el = document.getElementById(id); if (el) el.innerText = t(id); });
        document.getElementById('btn_apply_perf').title = t('btn_apply_perf');
        renderTable();
    }

    let tracks = [];
    let lastAutoDuration = "";

    // --- Drag & Drop ---
    const dropZone = document.getElementById('dropZone');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => { dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false); });
    dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => { dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

    document.getElementById('fileInput').addEventListener('change', function(e) { handleFiles(this.files); this.value = ''; });

    async function handleFiles(files) {
        const fileArray = Array.from(files).sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));
        for (let file of fileArray) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (['cue', 'txt'].includes(ext)) {
                const text = await readAutoEncoded(file);
                parseCue(text);
            } 
            else if (['flac', 'wav', 'mp3', 'ape', 'm4a', 'ogg'].includes(ext)) {
                const url = URL.createObjectURL(file);
                const audio = new Audio(url);
                audio.addEventListener('loadedmetadata', function() {
                    const totalSec = Math.round(audio.duration);
                    if (!isNaN(totalSec) && totalSec > 0) {
                        lastAutoDuration = String(Math.floor(totalSec/60)).padStart(2,'0') + ':' + String(totalSec%60).padStart(2,'0');
                        document.getElementById('split_total').value = lastAutoDuration;
                        document.getElementById('split_file').value = file.name;
                    }
                    URL.revokeObjectURL(url);
                });
                tracks.push({ filename: file.name, title: file.name.replace(/\.[^/.]+$/, ""), performer: "", index: "00:00:00" });
            }
        }
        renderTable();
    }

    async function readAutoEncoded(file) {
        const buffer = await file.arrayBuffer();
        try { return new TextDecoder("utf-8", { fatal: true }).decode(buffer); } 
        catch(e) { return new TextDecoder("windows-1251").decode(buffer); }
    }

    function addManualTrack() {
        let defaultFile = tracks.length > 0 ? tracks[tracks.length - 1].filename : "Audio.wav";
        tracks.push({ filename: defaultFile, title: t('new_track'), performer: "", index: "00:00:00" });
        renderTable();
    }

    // --- ФИЧА: Скопировать Исполнителя ---
    function applyPerformerToAll() {
        const p = document.getElementById('g_performer').value;
        if (!p) return;
        tracks.forEach(track => track.performer = p);
        renderTable();
    }

    // --- ФИЧА: Модалка Регистра ---
    function openCaseModal() { document.getElementById('caseModal').style.display = 'flex'; }
    function closeCaseModal() { document.getElementById('caseModal').style.display = 'none'; }
    
    function applyCase(mode) {
        if(tracks.length === 0) return closeCaseModal();
        
        // Список предлогов, артиклей и союзов (RU + EN)
        const stopWords = new Set(['a', 'an', 'the', 'and', 'but', 'or', 'for', 'nor', 'on', 'at', 'to', 'from', 'by', 'in', 'of', 'в', 'на', 'с', 'со', 'от', 'к', 'и', 'а', 'но', 'да', 'или', 'за', 'по', 'о', 'об', 'из', 'под', 'над', 'до', 'для']);

        tracks.forEach(t => {
            let text = t.title;
            if(!text) return;

            if (mode === 'upper') {
                text = text.toUpperCase();
            } 
            else if (mode === 'lower') {
                text = text.toLowerCase();
            } 
            else if (mode === 'sentence') {
                text = text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
            } 
            else if (mode === 'title') {
                // Каждое слово с заглавной (учитывая скобки, дефисы)
                text = text.toLowerCase().replace(/(^|\s|-|\(|\[|"|')([a-zа-яё])/g, m => m.toUpperCase());
            } 
            else if (mode === 'title_smart') {
                // Сначала делаем Title Case
                let temp = text.toLowerCase().replace(/(^|\s|-|\(|\[|"|')([a-zа-яё])/g, m => m.toUpperCase());
                // Потом возвращаем стоп-слова в нижний регистр, если они окружены пробелами
                stopWords.forEach(sw => {
                    let regex = new RegExp("\\s" + sw + "\\s", "gi");
                    temp = temp.replace(regex, " " + sw.toLowerCase() + " ");
                });
                text = temp;
            }
            t.title = text;
        });
        
        renderTable();
        closeCaseModal();
    }

    // --- МОДАЛЬНОЕ ОКНО НАРЕЗКИ ---
    function openSplitModal() {
        if(tracks.length > 0 && !document.getElementById('split_total').value) document.getElementById('split_file').value = tracks[tracks.length-1].filename;
        document.getElementById('splitModal').style.display = 'flex';
    }
    function closeSplitModal() { document.getElementById('splitModal').style.display = 'none'; }

    function parseMMSS(str) {
        if(!str) return 0; const parts = str.split(':');
        return (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
    }

    function formatTimeCUE(secTotal) {
        let m = Math.floor(secTotal / 60), s = Math.floor(secTotal % 60);
        let f = Math.round((secTotal - Math.floor(secTotal)) * 75);
        if(f === 75) { f = 0; s++; }
        if(s === 60) { s = 0; m++; }
        return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+':'+String(f).padStart(2,'0');
    }

    function applySplit() {
        const file = document.getElementById('split_file').value || "Audio.wav";
        const totalSec = parseMMSS(document.getElementById('split_total').value);
        if (totalSec <= 0) return alert(t('alert_duration'));

        const mode = document.querySelector('input[name="split_mode"]:checked').value;
        let intervals = [];
        if (mode === 'parts') {
            const parts = parseInt(document.getElementById('split_parts').value) || 2;
            for(let i = 0; i < parts; i++) intervals.push(i * (totalSec / parts));
        } else {
            const stepSec = parseMMSS(document.getElementById('split_time').value);
            if(stepSec <= 0) return alert(t('alert_duration'));
            for(let i = 0; i < totalSec; i += stepSec) intervals.push(i);
        }

        if(tracks.length === 1 && tracks[0].index === "00:00:00") tracks = [];
        intervals.forEach((sec, i) => { tracks.push({ filename: file, title: `${t('track_prefix')} ${i+1}`, performer: "", index: formatTimeCUE(sec) }); });
        renderTable(); closeSplitModal();
    }

    // --- ПАРСИНГ И РЕНДЕР ---
    function parseCue(text) {
        const lines = text.split(/\r?\n/);
        let currentFile = "Unknown.wav", currentTrack = null;

        lines.forEach(line => {
            line = line.trim();
            if (!currentTrack) {
                if (line.startsWith("PERFORMER")) { const m = line.match(/PERFORMER\s+"(.*)"/); if(m) fillGlobalIfEmpty('g_performer', m[1]); }
                else if (line.startsWith("TITLE")) { const m = line.match(/TITLE\s+"(.*)"/); if(m) fillGlobalIfEmpty('g_title', m[1]); }
                else if (line.startsWith("REM GENRE")) { fillGlobalIfEmpty('g_genre', line.replace('REM GENRE', '').trim().replace(/^"(.*)"$/, '$1')); }
                else if (line.startsWith("REM DATE")) { fillGlobalIfEmpty('g_date', line.replace('REM DATE', '').trim().replace(/^"(.*)"$/, '$1')); }
            }

            if (line.startsWith("FILE")) {
                const match = line.match(/FILE\s+"(.+)"\s+WAVE/);
                if (match) currentFile = match[1].split(/[\\/]/).pop();
            } else if (line.startsWith("TRACK")) {
                if (currentTrack) tracks.push(currentTrack);
                currentTrack = { filename: currentFile, title: "", performer: "", index: "00:00:00" };
            } else if (currentTrack) {
                if (line.startsWith("TITLE")) { const m = line.match(/TITLE\s+"(.*)"/); if (m) currentTrack.title = m[1]; } 
                else if (line.startsWith("PERFORMER")) { const m = line.match(/PERFORMER\s+"(.*)"/); if (m) currentTrack.performer = m[1]; } 
                else if (line.startsWith("INDEX 01")) { currentTrack.index = line.split(" ").pop(); }
            }
        });
        if (currentTrack) tracks.push(currentTrack);
    }

    function fillGlobalIfEmpty(id, val) {
        const el = document.getElementById(id);
        if (el && el.value.trim() === "") { el.value = val; if(id==='g_performer') updateTablePlaceholders(); }
    }

    function moveUp(i) { if(i===0) return; [tracks[i], tracks[i-1]] = [tracks[i-1], tracks[i]]; renderTable(); }
    function moveDown(i) { if(i===tracks.length-1) return; [tracks[i], tracks[i+1]] = [tracks[i+1], tracks[i]]; renderTable(); }
    function removeTrack(i) { tracks.splice(i, 1); renderTable(); }
    function insertTrackAfter(i) { tracks.splice(i+1, 0, {filename: tracks[i].filename, title: t('ins_track'), performer: "", index: "00:00:00"}); renderTable(); }
    function updateTrack(i, f, v) { tracks[i][f] = v; }
    function updateTablePlaceholders() { renderTable(); }

    function clearAll() {
        if (tracks.length > 0 && confirm(t('confirm_clear'))) {
            tracks = [];
            ['g_performer','g_title','g_genre','g_date','split_total'].forEach(id => { const e=document.getElementById(id); if(e) e.value = ""; });
            renderTable();
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        document.getElementById('emptyState').style.display = tracks.length ? 'none' : 'block';
        document.getElementById('trackTable').style.display = tracks.length ? 'table' : 'none';
        const globalPerf = document.getElementById('g_performer').value;

        tracks.forEach((track, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align:center; color:#888; font-weight:bold;">${i + 1}</td>
                <td><input class="table-input" value="${track.filename}" onchange="updateTrack(${i}, 'filename', this.value)"></td>
                <td><input class="table-input" style="font-weight:600;" value="${track.title}" onchange="updateTrack(${i}, 'title', this.value)"></td>
                <td><input class="table-input" placeholder="${globalPerf || t('ph_perf')}" value="${track.performer}" onchange="updateTrack(${i}, 'performer', this.value)"></td>
                <td><input class="table-input" style="text-align:center; font-family:monospace;" value="${track.index}" onchange="updateTrack(${i}, 'index', this.value)"></td>
                <td style="text-align:center; white-space:nowrap;">
                    <button class="btn-icon btn-move" onclick="moveUp(${i})" ${i===0?'disabled':''} title="${t('title_up')}">▲</button>
                    <button class="btn-icon btn-move" onclick="moveDown(${i})" ${i===tracks.length-1?'disabled':''} title="${t('title_down')}">▼</button>
                    <button class="btn-icon btn-ins" onclick="insertTrackAfter(${i})" title="${t('title_ins')}">➕</button>
                    <button class="btn-icon btn-del" onclick="removeTrack(${i})" title="${t('title_del')}">✖</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function saveCUE() {
        if (tracks.length === 0) return alert(t('alert_empty'));
        let content = [];
        const g_perf = document.getElementById('g_performer').value, g_title = document.getElementById('g_title').value;
        const g_genre = document.getElementById('g_genre').value, g_date = document.getElementById('g_date').value;

        if (g_genre) content.push(`REM GENRE ${g_genre}`);
        if (g_date) content.push(`REM DATE ${g_date}`);
        if (g_perf) content.push(`PERFORMER "${g_perf}"`);
        if (g_title) content.push(`TITLE "${g_title}"`);

        let lastFilename = "";
        tracks.forEach((track, i) => {
            if (track.filename !== lastFilename) { content.push(`FILE "${track.filename}" WAVE`); lastFilename = track.filename; }
            content.push(`  TRACK ${(i + 1).toString().padStart(2, '0')} AUDIO`);
            content.push(`    TITLE "${track.title}"`);
            let perf = track.performer.trim() || g_perf;
            if (perf) content.push(`    PERFORMER "${perf}"`);
            content.push(`    INDEX 01 ${track.index}`);
        });

        const blob = new Blob(['\uFEFF' + content.join('\r\n')], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = g_title ? `${g_title}.cue` : `Master.cue`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
    
    renderTable();
</script>
